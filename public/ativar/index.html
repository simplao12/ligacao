<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<title>STVBR · Ative sua TV</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0a0a0a" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --accent: #e0162b;
    --accent-rgb: 224, 22, 43;
    --accent-deep: #8a0d1c;
    --bg: #0a0a0a;
    --surface: #141414;
    --surface-2: #1a1a1a;
    --border: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.14);
    --text: #ffffff;
    --text-2: #b3b3b3;
    --text-3: #777777;
    --success: #3ecf8e;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Manrope', system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
  }
  body {
    min-height: 100vh;
    background:
      radial-gradient(ellipse 60% 50% at 80% -10%, rgba(var(--accent-rgb), 0.18), transparent 60%),
      radial-gradient(ellipse 40% 40% at 10% 110%, rgba(var(--accent-rgb), 0.10), transparent 60%),
      var(--bg);
    background-attachment: fixed;
  }
  a { color: inherit; text-decoration: none; }
  ::selection { background: var(--accent); color: #fff; }

  /* ===== Topbar ===== */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 28px;
    border-bottom: 1px solid var(--border);
    background: rgba(10,10,10,0.7);
    backdrop-filter: blur(10px);
    position: sticky; top: 0; z-index: 50;
  }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand-name { font-size: 18px; font-weight: 800; letter-spacing: 1.5px; }
  .brand-sub { font-size: 10px; color: var(--accent); letter-spacing: 1.5px; font-weight: 700; margin-top: 1px; text-transform: uppercase; }
  .topbar-right { display: flex; gap: 22px; }
  .link-muted { color: var(--text-2); font-size: 14px; font-weight: 500; transition: color 0.15s; }
  .link-muted:hover { color: var(--text); }

  /* ===== Main ===== */
  .main {
    max-width: 720px;
    margin: 0 auto;
    padding: 56px 24px 80px;
  }
  .hero-text { text-align: center; margin-bottom: 44px; }
  .hero-text h1 {
    font-size: clamp(32px, 5vw, 44px);
    font-weight: 800;
    letter-spacing: -1px;
    margin: 0 0 12px;
    line-height: 1.05;
  }
  .hero-text p {
    font-size: 16px;
    color: var(--text-2);
    margin: 0;
    max-width: 520px;
    margin: 0 auto;
  }
  .hero-text b { color: var(--text); font-weight: 700; }

  /* ===== Stepper ===== */
  .stepper {
    display: flex;
    align-items: flex-start;
    justify-content: center;
    margin: 0 auto 32px;
    max-width: 540px;
    padding: 0 8px;
  }
  .step { flex: 1; display: flex; flex-direction: column; align-items: center; position: relative; }
  .step-dot {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    color: var(--text-3);
    font-size: 13px; font-weight: 700;
    font-family: 'Space Grotesk', monospace;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.25s;
    z-index: 2;
  }
  .step-dot.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    box-shadow: 0 0 0 4px rgba(var(--accent-rgb), 0.18);
  }
  .step-dot.done {
    background: var(--accent);
    border-color: var(--accent);
  }
  .step-label {
    font-size: 11px;
    color: var(--text-3);
    margin-top: 8px;
    letter-spacing: 0.4px;
    font-weight: 600;
    text-transform: uppercase;
    text-align: center;
  }
  .step-label.active { color: var(--text); }
  .step-line {
    position: absolute;
    top: 16px;
    left: 50%;
    right: -50%;
    height: 1px;
    background: var(--border);
    z-index: 1;
  }
  .step-line.done { background: var(--accent); }

  /* ===== Cards ===== */
  .card {
    background: linear-gradient(180deg, var(--surface) 0%, var(--surface-2) 100%);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 36px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    animation: rise 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .card-head { margin-bottom: 28px; }
  .kicker {
    display: inline-block;
    padding: 4px 10px;
    background: rgba(var(--accent-rgb), 0.15);
    border: 1px solid rgba(var(--accent-rgb), 0.35);
    border-radius: 3px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: var(--accent);
    font-family: 'Space Grotesk', monospace;
    margin-bottom: 16px;
  }
  .card h2 { font-size: 28px; font-weight: 800; margin: 0 0 10px; letter-spacing: -0.5px; line-height: 1.15; }
  .muted { color: var(--text-2); margin: 0; font-size: 14px; }

  /* ===== Fields ===== */
  .field { display: block; margin-bottom: 18px; }
  .field-label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-2);
    margin-bottom: 8px;
    letter-spacing: 0.3px;
  }
  .text-input, .code-input {
    width: 100%;
    padding: 14px 16px;
    background: rgba(0,0,0,0.5);
    border: 1px solid var(--border-strong);
    border-radius: 10px;
    color: var(--text);
    font-size: 16px;
    font-family: inherit;
    transition: border-color 0.15s, background 0.15s;
    outline: none;
  }
  .text-input::placeholder { color: var(--text-3); }
  .text-input:focus, .code-input:focus {
    border-color: var(--accent);
    background: rgba(0,0,0,0.65);
  }
  .field-hint { display: block; font-size: 12px; color: var(--text-3); margin-top: 8px; }
  .err-msg { color: var(--accent); }
  .field-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  @media (max-width: 540px) {
    .field-row { grid-template-columns: 1fr; gap: 0; }
  }

  .code-input-row { position: relative; display: flex; align-items: center; }
  .code-input {
    font-family: 'Space Grotesk', monospace;
    font-weight: 700;
    font-size: 28px;
    letter-spacing: 6px;
    text-align: center;
    text-transform: uppercase;
    padding: 18px 16px;
  }
  .code-input.err { border-color: var(--accent); }
  .code-ok {
    position: absolute;
    right: 16px;
    width: 32px; height: 32px;
    border-radius: 50%;
    background: rgba(62, 207, 142, 0.15);
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }

  .pwd-wrap { position: relative; }
  .pwd-toggle {
    position: absolute;
    right: 6px;
    top: 50%;
    transform: translateY(-50%);
    width: 36px; height: 36px;
    background: transparent;
    border: 0;
    color: var(--text-3);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    border-radius: 8px;
    transition: color 0.15s, background 0.15s;
  }
  .pwd-toggle:hover { color: var(--text); background: rgba(255,255,255,0.05); }

  /* ===== Info box ===== */
  .info-box {
    display: flex; gap: 12px; align-items: flex-start;
    padding: 14px 16px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin: 20px 0;
    color: var(--text-2);
    font-size: 13px;
    line-height: 1.5;
  }
  .info-box svg { color: var(--accent); flex-shrink: 0; margin-top: 1px; }
  .info-box b { color: var(--text); font-weight: 700; }

  /* ===== Source cards ===== */
  .source-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }
  .source-card {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 18px 20px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    text-align: left;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
    width: 100%;
  }
  .source-card:hover { background: rgba(255,255,255,0.05); border-color: var(--border-strong); }
  .source-card.active {
    background: rgba(var(--accent-rgb), 0.08);
    border-color: rgba(var(--accent-rgb), 0.45);
  }
  .source-icon {
    width: 44px; height: 44px;
    border-radius: 10px;
    background: rgba(var(--accent-rgb), 0.12);
    color: var(--accent);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .source-card.active .source-icon { background: rgba(var(--accent-rgb), 0.2); }
  .source-body { flex: 1; min-width: 0; }
  .source-title-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .source-title { font-size: 15px; font-weight: 700; }
  .source-desc { font-size: 13px; color: var(--text-2); margin-top: 2px; }
  .tag {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1.2px;
    padding: 2px 6px;
    background: rgba(var(--accent-rgb), 0.2);
    color: var(--accent);
    border-radius: 3px;
    font-family: 'Space Grotesk', monospace;
  }
  .source-radio {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2px solid var(--border-strong);
    flex-shrink: 0;
    position: relative;
    transition: all 0.15s;
  }
  .source-radio.active { border-color: var(--accent); }
  .source-radio.active::after {
    content: ''; position: absolute; inset: 4px;
    border-radius: 50%; background: var(--accent);
  }

  /* ===== Buttons ===== */
  .btn-primary, .btn-ghost {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 14px 26px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    border: 0;
    font-family: inherit;
    transition: all 0.15s;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 4px 16px rgba(var(--accent-rgb), 0.35);
  }
  .btn-primary:hover:not(:disabled) {
    background: #f0263b;
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(var(--accent-rgb), 0.5);
  }
  .btn-primary:disabled {
    background: rgba(255,255,255,0.08);
    color: var(--text-3);
    cursor: not-allowed;
    box-shadow: none;
  }
  .btn-ghost {
    background: rgba(255,255,255,0.06);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover:not(:disabled) {
    background: rgba(255,255,255,0.1);
    border-color: var(--border-strong);
  }
  .btn-ghost:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-block { width: 100%; }

  .row-buttons {
    display: flex; gap: 10px; margin-top: 24px;
    justify-content: space-between;
  }
  .row-buttons .btn-primary { flex: 1; }

  /* ===== Drop / File ===== */
  .drop {
    border: 2px dashed var(--border-strong);
    border-radius: 14px;
    padding: 40px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
    background: rgba(0,0,0,0.2);
  }
  .drop:hover, .drop.dragging {
    border-color: var(--accent);
    background: rgba(var(--accent-rgb), 0.05);
  }
  .drop svg { display: block; margin: 0 auto 14px; }
  .drop-title { font-size: 15px; font-weight: 700; }
  .drop-sub { font-size: 13px; color: var(--text-2); margin-top: 6px; }
  .file-pill {
    display: flex; align-items: center; gap: 14px;
    padding: 16px 18px;
    background: rgba(var(--accent-rgb), 0.08);
    border: 1px solid rgba(var(--accent-rgb), 0.3);
    border-radius: 12px;
  }
  .file-info { flex: 1; min-width: 0; }
  .file-name {
    font-size: 14px; font-weight: 700;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .file-meta { font-size: 12px; color: var(--text-2); margin-top: 2px; }
  .file-remove {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: rgba(0,0,0,0.4);
    border: 0;
    color: var(--text);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .file-remove:hover { background: rgba(0,0,0,0.6); }

  /* ===== Test connection ===== */
  .test-block { margin: 18px 0 4px; }
  .test-result {
    display: flex; gap: 12px; align-items: flex-start;
    padding: 14px 16px;
    border-radius: 10px;
    margin-top: 10px;
    font-size: 13px;
    line-height: 1.45;
    animation: rise 0.25s;
  }
  .test-result.ok {
    background: rgba(62, 207, 142, 0.08);
    border: 1px solid rgba(62, 207, 142, 0.3);
  }
  .test-result.fail {
    background: rgba(var(--accent-rgb), 0.08);
    border: 1px solid rgba(var(--accent-rgb), 0.3);
  }
  .test-result b { font-size: 14px; }
  .test-stats { color: var(--text-2); margin-top: 3px; font-family: 'Space Grotesk', monospace; font-size: 12px; }
  .spin {
    width: 14px; height: 14px;
    border: 2px solid currentColor;
    border-top-color: transparent;
    border-radius: 50%;
    display: inline-block;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ===== Success ===== */
  .success-card { text-align: left; }
  .success-icon {
    width: 84px; height: 84px;
    border-radius: 50%;
    background: linear-gradient(135deg, #3ecf8e, #2da76e);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 24px;
    box-shadow: 0 12px 40px rgba(62, 207, 142, 0.4);
    animation: pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes pop {
    from { transform: scale(0.4); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .summary {
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 22px;
    margin: 24px 0;
  }
  .summary-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    gap: 12px;
  }
  .summary-row:last-child { border-bottom: 0; }
  .summary-key { font-size: 13px; color: var(--text-2); flex-shrink: 0; }
  .summary-val { font-size: 14px; font-weight: 600; text-align: right; min-width: 0; }
  .summary-val.mono { font-family: 'Space Grotesk', monospace; }
  .summary-val.trunc { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 60%; }
  .success-tip {
    display: flex; gap: 12px; align-items: flex-start;
    padding: 14px 16px;
    background: rgba(var(--accent-rgb), 0.06);
    border: 1px solid rgba(var(--accent-rgb), 0.2);
    border-radius: 10px;
    font-size: 13px;
    color: var(--text-2);
    line-height: 1.5;
    margin-bottom: 22px;
  }
  .success-tip svg { flex-shrink: 0; margin-top: 1px; }
  .success-tip b { color: var(--text); font-weight: 700; }

  .tv-status {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 13px;
    margin-bottom: 18px;
    transition: all 0.3s;
  }
  .tv-status.waiting {
    background: rgba(var(--accent-rgb), 0.08);
    border: 1px solid rgba(var(--accent-rgb), 0.25);
    color: var(--text-2);
  }
  .tv-status.waiting .spin { color: var(--accent); }
  .tv-status.ok {
    background: rgba(62, 207, 142, 0.08);
    border: 1px solid rgba(62, 207, 142, 0.3);
    color: var(--text);
    font-weight: 600;
  }

  /* ===== Help / FAQ ===== */
  .help { margin-top: 60px; }
  .help h3 {
    font-size: 22px;
    font-weight: 700;
    margin: 0 0 18px;
    letter-spacing: -0.3px;
  }
  .faq {
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 8px;
    overflow: hidden;
    background: rgba(255,255,255,0.02);
  }
  .faq.open { border-color: var(--border-strong); background: rgba(255,255,255,0.04); }
  .faq-q {
    display: flex;
    width: 100%;
    justify-content: space-between;
    align-items: center;
    background: transparent;
    border: 0;
    color: var(--text);
    text-align: left;
    padding: 16px 18px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }
  .faq-q:hover { color: var(--accent); }
  .faq-a {
    padding: 0 18px 16px;
    font-size: 13px;
    color: var(--text-2);
    line-height: 1.6;
  }

  /* ===== Footer ===== */
  .footer {
    display: flex; justify-content: space-between; align-items: center;
    padding: 32px 0 0;
    margin-top: 50px;
    border-top: 1px solid var(--border);
    color: var(--text-3);
    font-size: 12px;
  }
  .footer-links { display: flex; gap: 18px; }

  /* ===== Mobile ===== */
  @media (max-width: 600px) {
    .topbar { padding: 14px 18px; }
    .topbar-right { gap: 14px; }
    .main { padding: 32px 16px 60px; }
    .card { padding: 24px 20px; border-radius: 14px; }
    .card h2 { font-size: 22px; }
    .step-label { font-size: 10px; }
    .stepper { margin-bottom: 24px; }
    .code-input { font-size: 22px; letter-spacing: 4px; }
    .footer { flex-direction: column; gap: 14px; text-align: center; }
    .row-buttons .btn-ghost { padding-left: 16px; padding-right: 16px; }
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="../portal.jsx"></script>
</body>
</html>
